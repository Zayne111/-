dataset:
  feature_cache_root: /root/autodl-fs/cache/features
  train_list: /root/autodl-fs/splits/train.txt
  val_list: /root/autodl-fs/splits/val.txt
  test_list: /root/autodl-fs/splits/test.txt
  aspect_name: 1-3

model:
  in_dim: 29
  hidden_dim: 256
  dropout: 0.2
  use_aesthetic: true
  use_extra_features: true
  decode_transition_weight: 0.02
  pos_lambda: 0.25
  scale_lambda: 0.15

train:
  out_dir: /root/autodl-tmp/crop_aware_ranker
  epochs: 40
  batch_size: 1
  num_workers: 0
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 42
  cpu: false

  hard_ce_weight: 2.0
  listwise_weight: 1.0
  listwise_temperature: 0.08
  pairwise_weight: 2.0
  pairwise_margin: 0.2
  pairwise_target_gap: 0.05
  path_ce_weight: 1.0
  path_iou_weight: 1.0
  smooth_weight: 0.001

eval:
  checkpoint: /root/autodl-tmp/crop_aware_ranker/best.pt
  out_dir: /root/autodl-tmp/results/CropAwareRanker_1_3
  num_workers: 0
  export_txt: true
  cpu: false
